<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>kerf-cad viewer</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #0d1116;
    --panel: #161b22;
    --line: #30363d;
    --fg: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--fg);
    font: 13px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  #app { display: grid; grid-template-columns: 320px 1fr; height: 100%; }
  #panel { padding: 16px; overflow-y: auto; border-right: 1px solid var(--line);
    background: var(--panel); }
  #panel h1 { margin: 0 0 4px; font-size: 15px; font-weight: 600; }
  #panel .sub { color: var(--muted); margin: 0 0 16px; font-size: 12px; }
  #drop { border: 1px dashed var(--line); border-radius: 6px; padding: 18px;
    text-align: center; cursor: pointer; color: var(--muted);
    transition: border-color .15s, color .15s; }
  #drop.over, #drop:hover { border-color: var(--accent); color: var(--accent); }
  #drop input { display: none; }
  #targets { margin-top: 16px; }
  #targets label { display: block; color: var(--muted); margin-bottom: 4px; font-size: 12px; }
  #targets select { width: 100%; padding: 6px 8px; background: var(--bg);
    color: var(--fg); border: 1px solid var(--line); border-radius: 4px; }
  #params { margin-top: 18px; }
  #params .row { margin-bottom: 12px; }
  #params .row label { display: flex; justify-content: space-between;
    color: var(--muted); margin-bottom: 4px; font-size: 12px; font-variant-numeric: tabular-nums; }
  #params .row label .val { color: var(--fg); }
  #params input[type=range] { width: 100%; }
  #status { margin-top: 18px; padding: 10px; border-radius: 4px;
    background: var(--bg); border: 1px solid var(--line); font-family: ui-monospace,
    "SF Mono", Menlo, monospace; font-size: 11px; color: var(--muted);
    min-height: 36px; white-space: pre-wrap; }
  #status.error { color: #ff7b72; border-color: #ff7b72; }
  #actions, #actions2 { margin-top: 8px; display: flex; gap: 8px; }
  #actions2 { margin-top: 6px; }
  #views { margin-top: 14px; }
  #views label { display: block; color: var(--muted); margin-bottom: 4px; font-size: 12px; }
  #views label.checkbox { margin-top: 10px; color: var(--fg); cursor: pointer; }
  #views .view-row { display: flex; gap: 4px; }
  .hotkeys { margin-top: 10px; color: var(--muted); font-size: 11px;
    line-height: 1.6; }
  .hotkeys code { background: var(--bg); padding: 1px 5px; border-radius: 3px;
    border: 1px solid var(--line); margin-right: 4px; color: var(--fg);
    font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 10px; }
  #feature-tree { margin-top: 14px; }
  #feature-tree label { display: block; color: var(--muted); margin-bottom: 4px;
    font-size: 12px; }
  #feature-tree label .muted { color: var(--muted); font-weight: 400; margin-left: 4px; }
  #feature-list { margin: 0; padding: 0 0 0 18px; max-height: 150px; overflow-y: auto;
    font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px; }
  #feature-list li { line-height: 1.6; padding: 1px 4px; border-radius: 3px; cursor: pointer; }
  #feature-list li { display: flex; align-items: center; gap: 6px; }
  #feature-list li:hover { background: var(--bg); color: var(--accent); }
  #feature-list li.target { color: var(--accent); }
  #feature-list .kind { color: var(--muted); }
  #feature-list .id { flex: 1; }
  #feature-list .del { color: var(--muted); padding: 0 4px; visibility: hidden;
    border-radius: 3px; cursor: pointer; }
  #feature-list li:hover .del { visibility: visible; }
  #feature-list .del:hover { color: #ff7b72; background: rgba(255,123,114,0.1); }
  #selected-feature { margin-top: 14px; padding: 10px; border: 1px solid var(--accent);
    border-radius: 4px; background: rgba(88,166,255,0.04); }
  #selected-feature .sf-head { display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 8px; }
  #selected-feature-title { font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 12px; color: var(--accent); }
  #selected-feature .sf-close { color: var(--muted); cursor: pointer; padding: 0 6px;
    border-radius: 3px; font-size: 11px; }
  #selected-feature .sf-close:hover { color: var(--fg); background: var(--bg); }
  #selected-feature .sf-row { margin-bottom: 8px; }
  #selected-feature .sf-row label { display: flex; justify-content: space-between;
    color: var(--muted); margin-bottom: 2px; font-size: 11px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace; }
  #selected-feature .sf-row label .sf-val { color: var(--fg); }
  #selected-feature .sf-row label .sf-muted { color: var(--muted); font-style: italic; }
  #selected-feature .sf-row input[type=range] { width: 100%; }
  #selected-feature .sf-row input[type=text] { width: 100%; padding: 4px 6px;
    background: var(--bg); color: var(--fg); border: 1px solid var(--line);
    border-radius: 3px; font: 11px ui-monospace, "SF Mono", Menlo, monospace; }
  #selected-feature .sf-empty { color: var(--muted); font-style: italic; font-size: 11px; }
  button { background: var(--bg); color: var(--fg); border: 1px solid var(--line);
    border-radius: 4px; padding: 6px 10px; font: inherit; cursor: pointer; flex: 1;
    transition: border-color .15s, color .15s; }
  button:hover { border-color: var(--accent); color: var(--accent); }
  button:disabled { color: var(--muted); border-color: var(--line); cursor: default; }
  button:disabled:hover { color: var(--muted); border-color: var(--line); }
  canvas { display: block; }
  #stage { position: relative; }
  .examples { margin-top: 12px; font-size: 12px; color: var(--muted); }
  .examples a { color: var(--accent); text-decoration: none; cursor: pointer; }
  .examples a:hover { text-decoration: underline; }

  /* Error overlay banner — pinned to the top of the 3D stage. */
  .error-overlay {
    position: absolute; top: 0; left: 0; right: 0; z-index: 10;
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 16px;
    background: rgba(220, 50, 60, 0.92);
    color: #fff;
    border-bottom: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 6px 24px rgba(0,0,0,0.4);
    cursor: pointer;
    font: 12px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    backdrop-filter: blur(2px);
  }
  .error-overlay[hidden] { display: none; }
  .error-overlay .eo-icon {
    flex: 0 0 22px; width: 22px; height: 22px;
    border-radius: 50%; background: rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
  }
  .error-overlay .eo-body { flex: 1; min-width: 0; }
  .error-overlay .eo-title {
    font-weight: 600; font-size: 13px; margin-bottom: 3px;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .error-overlay .eo-msg {
    font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px;
    word-break: break-word;
  }
  .error-overlay .eo-feature {
    margin-top: 4px; font-size: 11px; opacity: 0.92;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
  .error-overlay .eo-dismiss {
    flex: 0 0 auto; padding: 2px 8px;
    border: 1px solid rgba(255,255,255,0.4); border-radius: 3px;
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em;
    align-self: flex-start;
  }
  .error-overlay:hover .eo-dismiss { background: rgba(255,255,255,0.15); }

  /* Feature catalog browser. */
  #catalog { margin-top: 14px; }
  #catalog label { display: block; color: var(--muted); margin-bottom: 4px; font-size: 12px; }
  #catalog .cat-toggle { background: var(--bg); color: var(--fg); border: 1px solid var(--line);
    border-radius: 4px; padding: 6px 10px; font: inherit; cursor: pointer; width: 100%;
    text-align: left; }
  #catalog .cat-toggle:hover { border-color: var(--accent); color: var(--accent); }
  #catalog-body { margin-top: 8px; }
  #catalog-body[hidden] { display: none; }
  #catalog-search { width: 100%; padding: 6px 8px; background: var(--bg);
    color: var(--fg); border: 1px solid var(--line); border-radius: 4px;
    font: 12px ui-monospace, "SF Mono", Menlo, monospace; margin-bottom: 8px; }
  #catalog-list { max-height: 240px; overflow-y: auto;
    border: 1px solid var(--line); border-radius: 4px; padding: 6px 4px;
    background: var(--bg); }
  #catalog-list .cat-section { margin: 4px 0 8px; }
  #catalog-list .cat-section h3 {
    margin: 0 0 4px; font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.05em;
    padding-left: 4px;
  }
  #catalog-list .cat-section ul { list-style: none; margin: 0; padding: 0; }
  #catalog-list .cat-section li {
    padding: 3px 6px; cursor: pointer; border-radius: 3px;
    font: 11px ui-monospace, "SF Mono", Menlo, monospace;
    color: var(--fg);
  }
  #catalog-list .cat-section li:hover { background: rgba(88,166,255,0.12); color: var(--accent); }
  #catalog-empty { color: var(--muted); font-style: italic; padding: 6px;
    font-size: 11px; }

  /* Undo/redo strip — sits next to the existing actions. */
  #history-actions { margin-top: 8px; display: flex; gap: 8px; }
</style>
</head>
<body>
<div id="app">
  <aside id="panel">
    <h1>kerf-cad viewer</h1>
    <p class="sub">Drop a kerf-cad model JSON, scrub parameters, see the mesh.</p>
    <label id="drop" for="file">
      <input id="file" type="file" accept=".json,application/json" />
      <strong>Drop JSON</strong> or click to choose
    </label>
    <div class="examples">
      Try one:
      <a data-example="bracket">bracket</a> ·
      <a data-example="hollow_box">hollow_box</a> ·
      <a data-example="multi_stage_carve">multi_stage_carve</a> ·
      <a data-example="hex_prism">hex_prism</a> ·
      <a data-example="bolt_circle">bolt_circle</a> ·
      <a data-example="tube">tube</a>
    </div>
    <div id="targets" hidden>
      <label for="target-select">Target</label>
      <select id="target-select"></select>
    </div>
    <div id="feature-tree" hidden>
      <label>Features <span class="muted" id="feature-count"></span></label>
      <ol id="feature-list"></ol>
    </div>
    <div id="params"></div>
    <div id="actions" hidden>
      <button id="download-btn">Download JSON</button>
      <button id="reset-btn">Reset params</button>
    </div>
    <div id="history-actions" hidden>
      <button id="undo-btn" disabled title="undo (Ctrl+Z)">↶ Undo</button>
      <button id="redo-btn" disabled title="redo (Ctrl+Y / Ctrl+Shift+Z)">↷ Redo</button>
    </div>
    <div id="actions2" hidden>
      <button id="drawing-btn">Export 3-view PNG</button>
    </div>
    <div id="catalog" hidden>
      <button class="cat-toggle" id="catalog-toggle" type="button">
        <span id="catalog-toggle-label">▶ Browse Features</span>
      </button>
      <div id="catalog-body" hidden>
        <input id="catalog-search" type="search" placeholder="search 230+ kinds…" />
        <div id="catalog-list"></div>
      </div>
    </div>
    <div id="views" hidden>
      <label>View</label>
      <div class="view-row">
        <button data-view="iso">iso</button>
        <button data-view="front">front</button>
        <button data-view="top">top</button>
        <button data-view="side">side</button>
      </div>
      <label class="checkbox">
        <input type="checkbox" id="wireframe-toggle" />
        wireframe overlay
      </label>
      <div class="hotkeys">
        <code>1</code>iso <code>2</code>front <code>3</code>top <code>4</code>side<br>
        <code>W</code>wireframe <code>R</code>reset <code>D</code>drawing <code>S</code>save<br>
        <code>⌘Z</code>undo <code>⌘⇧Z</code>/<code>⌘Y</code>redo
      </div>
    </div>
    <div id="selected-feature" hidden>
      <div class="sf-head">
        <span id="selected-feature-title"></span>
        <span class="sf-close" title="clear (Esc)">✕</span>
      </div>
      <div id="selected-feature-body"></div>
    </div>
    <div id="status">no model loaded</div>
  </aside>
  <div id="stage"></div>
</div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
