<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>kerf-cad viewer</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #0d1116;
    --panel: #161b22;
    --line: #30363d;
    --fg: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--fg);
    font: 13px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  #app { display: grid; grid-template-columns: 320px 1fr; height: 100%; }
  #panel { padding: 16px; overflow-y: auto; border-right: 1px solid var(--line);
    background: var(--panel); }
  #main-area { display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
  #stage { flex: 1; position: relative; min-height: 0; overflow: hidden; }

  /* --- toolbar --- */
  #toolbar {
    height: 42px;
    min-height: 42px;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    overflow: hidden;
  }
  #toolbar-inner button {
    flex: unset;
    padding: 4px 10px;
    font-size: 12px;
    white-space: nowrap;
    height: 30px;
    line-height: 1;
    border-radius: 4px;
  }
  #toolbar-inner button:hover { border-color: var(--accent); color: var(--accent); }
  #toolbar-inner button:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    border-color: var(--line);
    color: var(--muted);
  }
  #toolbar-inner button:disabled:hover {
    border-color: var(--line);
    color: var(--muted);
  }
  #panel h1 { margin: 0 0 4px; font-size: 15px; font-weight: 600; }
  #panel .sub { color: var(--muted); margin: 0 0 16px; font-size: 12px; }
  #drop { border: 1px dashed var(--line); border-radius: 6px; padding: 18px;
    text-align: center; cursor: pointer; color: var(--muted);
    transition: border-color .15s, color .15s; }
  #drop.over, #drop:hover { border-color: var(--accent); color: var(--accent); }
  #drop input { display: none; }
  #targets { margin-top: 16px; }
  #targets label { display: block; color: var(--muted); margin-bottom: 4px; font-size: 12px; }
  #targets select { width: 100%; padding: 6px 8px; background: var(--bg);
    color: var(--fg); border: 1px solid var(--line); border-radius: 4px; }
  #params { margin-top: 18px; }
  #params .row { margin-bottom: 12px; }
  #params .row label { display: flex; justify-content: space-between;
    color: var(--muted); margin-bottom: 4px; font-size: 12px; font-variant-numeric: tabular-nums; }
  #params .row label .val { color: var(--fg); }
  #params input[type=range] { width: 100%; }
  #status { margin-top: 18px; padding: 10px; border-radius: 4px;
    background: var(--bg); border: 1px solid var(--line); font-family: ui-monospace,
    "SF Mono", Menlo, monospace; font-size: 11px; color: var(--muted);
    min-height: 36px; white-space: pre-wrap; }
  #status.error { color: #ff7b72; border-color: #ff7b72; }
  #actions, #actions2 { margin-top: 8px; display: flex; gap: 8px; }
  #actions2 { margin-top: 6px; }
  #views { margin-top: 14px; }
  #views label { display: block; color: var(--muted); margin-bottom: 4px; font-size: 12px; }
  #views label.checkbox { margin-top: 10px; color: var(--fg); cursor: pointer; }
  #views .view-row { display: flex; gap: 4px; }
  .hotkeys { margin-top: 10px; color: var(--muted); font-size: 11px;
    line-height: 1.6; }
  .hotkeys code { background: var(--bg); padding: 1px 5px; border-radius: 3px;
    border: 1px solid var(--line); margin-right: 4px; color: var(--fg);
    font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 10px; }
  #feature-tree { margin-top: 14px; }
  #feature-tree label { display: block; color: var(--muted); margin-bottom: 4px;
    font-size: 12px; }
  #feature-tree label .muted { color: var(--muted); font-weight: 400; margin-left: 4px; }
  #feature-list { margin: 0; padding: 0 0 0 18px; max-height: 150px; overflow-y: auto;
    font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px; }
  #feature-list li { line-height: 1.6; padding: 1px 4px; border-radius: 3px; cursor: pointer; }
  #feature-list li { display: flex; align-items: center; gap: 6px; }
  #feature-list li:hover { background: var(--bg); color: var(--accent); }
  #feature-list li.target { color: var(--accent); }
  #feature-list .kind { color: var(--muted); }
  #feature-list .id { flex: 1; }
  #feature-list .del { color: var(--muted); padding: 0 4px; visibility: hidden;
    border-radius: 3px; cursor: pointer; }
  #feature-list li:hover .del { visibility: visible; }
  #feature-list .del:hover { color: #ff7b72; background: rgba(255,123,114,0.1); }
  button { background: var(--bg); color: var(--fg); border: 1px solid var(--line);
    border-radius: 4px; padding: 6px 10px; font: inherit; cursor: pointer; flex: 1;
    transition: border-color .15s, color .15s; }
  button:hover { border-color: var(--accent); color: var(--accent); }
  canvas { display: block; }
  .examples { margin-top: 12px; font-size: 12px; color: var(--muted); }
  .examples a { color: var(--accent); text-decoration: none; cursor: pointer; }
  .examples a:hover { text-decoration: underline; }

  /* --- property manager --- */
  .pm-row { margin-bottom: 14px; }
  .pm-row-header { display: flex; align-items: center; gap: 4px; margin-bottom: 4px; }
  .pm-label { flex: 1; color: var(--muted); font-size: 12px; font-variant-numeric: tabular-nums; }
  .pm-fx-btn, .pm-reset-btn {
    background: none; border: 1px solid var(--line); border-radius: 3px;
    color: var(--muted); font-size: 11px; padding: 1px 5px; cursor: pointer;
    flex: none; transition: border-color .15s, color .15s;
  }
  .pm-fx-btn:hover, .pm-reset-btn:hover { border-color: var(--accent); color: var(--accent); }
  .pm-fx-active { border-color: var(--accent) !important; color: var(--accent) !important; }
  .pm-stepper { display: flex; gap: 4px; margin-bottom: 4px; }
  .pm-number-input {
    flex: 1; background: var(--bg); color: var(--fg);
    border: 1px solid var(--line); border-radius: 4px;
    padding: 4px 6px; font: inherit; font-size: 12px;
    font-variant-numeric: tabular-nums;
  }
  .pm-number-input:focus { outline: none; border-color: var(--accent); }
  .pm-step-up, .pm-step-down {
    background: var(--bg); border: 1px solid var(--line); border-radius: 3px;
    color: var(--muted); font-size: 10px; padding: 2px 5px; cursor: pointer;
    flex: none; line-height: 1; transition: border-color .15s, color .15s;
  }
  .pm-step-up:hover, .pm-step-down:hover { border-color: var(--accent); color: var(--accent); }
  .pm-slider { width: 100%; margin-top: 2px; }
  .pm-expr-wrap { margin-top: 4px; }
  .pm-expr-input {
    width: 100%; background: var(--bg); color: var(--fg);
    border: 1px solid var(--accent); border-radius: 4px;
    padding: 4px 6px; font: inherit; font-size: 12px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
  .pm-expr-input:focus { outline: none; }
  .pm-expr-preview {
    margin-top: 3px; font-size: 11px; color: var(--muted);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    min-height: 14px;
  }
  .pm-expr-error { color: #ff7b72 !important; }

  /* --- save status --- */
  .save-status { font-size: 11px; color: var(--muted); margin-top: 6px;
    font-family: ui-monospace, Menlo, monospace; min-height: 14px; }
  .save-status.dirty::after { content: " *"; color: var(--accent); }
  .save-toast { position: fixed; bottom: 16px; right: 16px; padding: 10px 14px;
    background: var(--panel); border: 1px solid var(--accent); border-radius: 6px;
    color: var(--fg); font-size: 12px; cursor: pointer; z-index: 60;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
  .save-toast:hover { border-color: var(--fg); }

  /* --- sketcher panel --- */
  #sketcher-toggle { margin-top: 14px; }
  #sketcher-panel { display: none; position: fixed; right: 16px; top: 16px;
    width: 440px; background: var(--panel); border: 1px solid var(--line);
    border-radius: 6px; padding: 12px; z-index: 50; box-shadow: 0 4px 24px rgba(0,0,0,0.4); }
  #sketcher-panel.visible { display: block; }
  #sketcher-panel h2 { margin: 0 0 8px; font-size: 13px; font-weight: 600;
    display: flex; justify-content: space-between; align-items: center; }
  #sketcher-panel h2 .close { color: var(--muted); cursor: pointer; padding: 0 6px;
    border-radius: 3px; }
  #sketcher-panel h2 .close:hover { color: #ff7b72; background: rgba(255,123,114,0.1); }
  #sketcher-host .sk-toolbar { display: flex; gap: 4px; margin-bottom: 8px; }
  #sketcher-host .sk-toolbar button { flex: 1; padding: 4px 6px; font-size: 14px; }
  #sketcher-host .sk-toolbar button.active { border-color: var(--accent); color: var(--accent); }
  #sketcher-host .sk-canvas { display: block; width: 400px; height: 400px;
    border: 1px solid var(--line); border-radius: 4px; background: var(--bg);
    margin: 0 auto; cursor: crosshair; }
  #sketcher-host .sk-row { display: flex; gap: 8px; margin-top: 6px; align-items: center;
    color: var(--muted); font-size: 11px; }
  #sketcher-host .sk-row label { display: flex; gap: 4px; align-items: center; }
  #sketcher-host .sk-row button { flex: 1; }
  #sketcher-host .sk-status { margin-top: 6px; font-family: ui-monospace,Menlo,monospace;
    font-size: 11px; color: var(--muted); padding: 4px 8px; border: 1px solid var(--line);
    border-radius: 4px; background: var(--bg); min-height: 20px; }
  .sk-examples { margin-top: 8px; font-size: 11px; color: var(--muted); }
  .sk-examples a { color: var(--accent); cursor: pointer; }
  .sk-examples a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div id="app">
  <aside id="panel">
    <h1>kerf-cad viewer</h1>
    <p class="sub">Drop a kerf-cad model JSON, scrub parameters, see the mesh.</p>
    <label id="drop" for="file">
      <input id="file" type="file" accept=".json,application/json" />
      <strong>Drop JSON</strong> or click to choose
    </label>
    <div class="examples">
      Try one:
      <a data-example="mug">mug</a> ·
      <a data-example="bracket">bracket</a> ·
      <a data-example="hollow_box">hollow_box</a> ·
      <a data-example="multi_stage_carve">multi_stage_carve</a> ·
      <a data-example="hex_prism">hex_prism</a> ·
      <a data-example="bolt_circle">bolt_circle</a> ·
      <a data-example="tube">tube</a>
    </div>
    <div id="targets" hidden>
      <label for="target-select">Target</label>
      <select id="target-select"></select>
    </div>
    <div id="feature-tree" hidden>
      <label>Features <span class="muted" id="feature-count"></span></label>
      <ol id="feature-list"></ol>
    </div>
    <div id="params"></div>
    <div id="actions" hidden>
      <button id="open-btn" title="Open a kerf-cad model file">Open…</button>
      <button id="save-btn" title="Save (⌘S / Ctrl+S)">Save</button>
      <button id="save-as-btn" title="Save as…">Save as…</button>
      <button id="reset-btn">Reset params</button>
      <div id="save-status" class="save-status"></div>
    </div>
    <div id="actions2" hidden>
      <button id="drawing-btn">Export 3-view PNG</button>
    </div>
    <div id="views" hidden>
      <label>View</label>
      <div class="view-row">
        <button data-view="iso">iso</button>
        <button data-view="front">front</button>
        <button data-view="top">top</button>
        <button data-view="side">side</button>
      </div>
      <label class="checkbox">
        <input type="checkbox" id="wireframe-toggle" />
        wireframe overlay
      </label>
      <div class="hotkeys">
        <code>1</code>iso <code>2</code>front <code>3</code>top <code>4</code>side<br>
        <code>W</code>wireframe <code>R</code>reset <code>D</code>drawing <code>S</code>save
      </div>
    </div>
    <div id="status">no model loaded</div>
    <button id="sketcher-toggle">Open 2D sketcher</button>
  </aside>
  <div id="main-area">
    <div id="toolbar"></div>
    <div id="stage"></div>
  </div>
</div>

<div id="sketcher-panel">
  <h2>
    2D Sketcher
    <span class="close" id="sketcher-close" title="Close">✕</span>
  </h2>
  <div id="sketcher-host"></div>
  <div class="sk-examples">
    Try a sketch:
    <a data-sk-example="sketch_rectangle">rectangle</a>
  </div>
</div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
